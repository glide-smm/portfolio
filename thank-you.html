<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дякуємо — Glide SMM Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bordo:#8B1A3A;--bordo-light:#B8396A;--pink:#D4A0B0;--pink-light:#F2E4E9;--green:#2D5A3D;--cream:#FAF7F2;--cream2:#F0EBE3;--ink:#1A1210;--ink2:#4A3D38;--ink3:#857A75;--white:#FFFFFF;--line:rgba(139,26,58,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.65;min-height:100vh;display:flex;flex-direction:column}

.wrap{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{max-width:560px;width:100%;text-align:center;animation:rise .7s cubic-bezier(.22,.61,.36,1) both}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* галочка */
.check{width:96px;height:96px;border-radius:50%;background:var(--bordo);display:flex;align-items:center;justify-content:center;margin:0 auto 36px;box-shadow:0 14px 40px rgba(139,26,58,.22)}
.check svg{width:46px;height:46px}
.check svg path{stroke:#fff;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:48;stroke-dashoffset:48;animation:draw .6s .35s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}

.tag{display:inline-block;background:var(--pink-light);color:var(--bordo);font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;padding:6px 16px;margin-bottom:24px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,6vw,60px);font-weight:400;line-height:1.05;color:var(--ink);margin-bottom:22px}
h1 em{font-style:italic;color:var(--bordo)}
.lead{font-size:17px;color:var(--ink2);line-height:1.7;max-width:440px;margin:0 auto 40px}

.btn-primary{background:var(--bordo);color:var(--white);padding:16px 40px;font-family:'Manrope',sans-serif;font-size:15px;font-weight:500;border:none;cursor:pointer;text-decoration:none;display:inline-block;letter-spacing:0.04em;transition:background .2s}
.btn-primary:hover{background:var(--bordo-light)}

.foot{position:relative;z-index:1;text-align:center;padding:28px 24px;color:var(--ink3);font-size:13px;letter-spacing:0.04em}

@media(max-width:480px){
  .lead{font-size:16px}
  .check{width:84px;height:84px;margin-bottom:28px}
}
</style>
</head>
<body>

<main class="wrap">
  <div class="card">
    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 52 52"><path d="M14 27 l8 8 l16 -18"/></svg>
    </div>
    <span class="tag">Заявку отримано</span>
    <h1>Дякуємо за <em>заявку</em></h1>
    <p class="lead">Ми вже отримали ваше повідомлення і скоро зв'яжемося з вами, щоб обговорити проєкт. Зазвичай відповідаємо протягом робочого дня.</p>
    <a href="index.html" class="btn-primary">На головну</a>
  </div>
</main>

<footer class="foot">Glide SMM Studio</footer>
</body>
</html>
